<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-container {
    background: white;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    padding: 40px;
    max-width: 400px;
    width: 100%;
    display: flex;
    flex-direction: column;
}

.login-container h1 {
    text-align: center;
    color: #333;
    margin-bottom: 10px;
    font-size: 28px;
}

.login-container p {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
    font-size: 14px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: bold;
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 5px;
    font-size: 14px;
    transition: border-color 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.login-btn:active {
    transform: translateY(0);
}

.error-message {
    color: #e74c3c;
    text-align: center;
    margin-bottom: 15px;
    font-size: 13px;
    display: none;
    padding: 10px;
    background: #fadbd8;
    border-radius: 5px;
    border-left: 4px solid #e74c3c;
}

.error-message.show {
    display: block;
}

.success-message {
    color: #27ae60;
    text-align: center;
    margin-bottom: 15px;
    font-size: 13px;
    display: none;
    padding: 10px;
    background: #d5f4e6;
    border-radius: 5px;
    border-left: 4px solid #27ae60;
}

.success-message.show {
    display: block;
}

.jadwal-container {
    display: none;
}

.jadwal-container.active {
    display: block;
}

/* Jadwal Kelas Styles */
.jadwal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.jadwal-header h1 {
    text-align: left;
    color: white;
}

.logout-btn {
    padding: 10px 20px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
}

.logout-btn:hover {
    background: #c0392b;
}

.cinema {
    background: #1b1b2f;
    border-radius: 10px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.floor-label {
    font-size: 16px;
    font-weight: bold;
    margin: 20px 0 10px 0;
    color: #FFD700;
    text-align: center;
}

.row {
    display: flex;
    justify-content: center;
    margin: 8px 0;
    flex-wrap: wrap;
}

.seat-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 5px;
}

.seat-box input {
    width: 60px;
    margin-top: 5px;
    padding: 4px;
    font-size: 11px;
    text-align: center;
    border-radius: 5px;
    border: none;
}

.seat {
    width: 40px;
    height: 40px;
    background: gray;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.seat:hover {
    transform: scale(1.1);
}

.selected {
    background: limegreen;
}

.occupied {
    background: red;
}

.info {
    margin-top: 20px;
    font-size: 18px;
    color: white;
    text-align: center;
}

<script>
const CORRECT_PASSWORD = "uin2026"; // Ubah password sesuai kebutuhan

function validateLogin() {
    const passwordInput = document.getElementById('passwordInput').value;
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    
    // Hapus pesan sebelumnya
    errorMessage.classList.remove('show');
    successMessage.classList.remove('show');
    
    if (passwordInput === '') {
        errorMessage.textContent = '⚠️ Password tidak boleh kosong!';
        errorMessage.classList.add('show');
        return;
    }
    
    if (passwordInput === CORRECT_PASSWORD) {
        successMessage.textContent = '✓ Login berhasil! Mengalihkan...';
        successMessage.classList.add('show');
        
        setTimeout(() => {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('jadwalContainer').classList.add('active');
            initializeSeats();
        }, 1000);
    } else {
        errorMessage.textContent = '❌ Password salah! Coba lagi.';
        errorMessage.classList.add('show');
        document.getElementById('passwordInput').value = '';
    }
}

function logout() {
    document.getElementById('jadwalContainer').classList.remove('active');
    document.getElementById('loginContainer').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
    document.getElementById('errorMessage').classList.remove('show');
    document.getElementById('successMessage').classList.remove('show');
}

function initializeSeats() {
    const seats = document.querySelectorAll('.seat');
    const count = document.getElementById('count');
    
    function updateCount() {
        const selectedSeats = document.querySelectorAll('.seat.selected');
        count.textContent = selectedSeats.length;
    }
    
    seats.forEach(seat => {
        seat.addEventListener('click', () => {
            if (seat.classList.contains('occupied')) {
                seat.classList.remove('occupied');
            } else if (seat.classList.contains('selected')) {
                seat.classList.remove('selected');
            } else {
                seat.classList.add('selected');
            }
            updateCount();
        });
    });
}

// Deteksi Enter key di password input
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('passwordInput').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            validateLogin();
        }
    });
});
</script>
